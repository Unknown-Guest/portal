        document.documentElement.style.setProperty('--scp-green',t.accent);
        document.documentElement.style.setProperty('--scp-green-soft',t.accent);
        var hex=t.accent.replace('#','');
        var r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);

    }
})();
</script>

<script>
/* ── AUTO-LOGOUT ON INACTIVITY (15 min) ──────────────────────────────────────── */
(function(){
    var IDLE_MS = 15 * 60 * 1000; // 15 minutes
    var WARN_MS = 13 * 60 * 1000; // warn at 13 minutes
    var _idleTimer, _warnTimer, _warnBanner;

    function _createWarnBanner() {
        if (_warnBanner) return;
        _warnBanner = document.createElement('div');
        _warnBanner.id = '_idle_warn';
        _warnBanner.style.cssText = 'display:none;position:fixed;top:0;left:0;right:0;z-index:999999;background:#1a1a00;color:#ffcc00;font-family:Arial,sans-serif;font-size:11px;letter-spacing:1.5px;padding:7px 14px;text-align:center;border-bottom:1px solid #ffcc00;';
        _warnBanner.innerHTML = '⏱ You will be logged out in 2 minutes due to inactivity. <button onclick="_resetIdleTimer()" style="margin-left:12px;background:#ffcc00;color:#000;border:none;padding:3px 10px;font-size:10px;font-weight:bold;cursor:pointer;letter-spacing:1px;">STAY LOGGED IN</button>';
        document.addEventListener('DOMContentLoaded', function(){ document.body.appendChild(_warnBanner); });
    }

    function _logout() {
        localStorage.removeItem('loggedInUser');
        sessionStorage.clear();
        window.location.href = 'Index.html';
    }

    window._resetIdleTimer = function() {
        clearTimeout(_idleTimer);
        clearTimeout(_warnTimer);
        if (_warnBanner) _warnBanner.style.display = 'none';
        _warnTimer = setTimeout(function(){
            if (_warnBanner) _warnBanner.style.display = 'block';
        }, WARN_MS);
        _idleTimer = setTimeout(_logout, IDLE_MS);
    };

    _createWarnBanner();
    _resetIdleTimer();

    // Reset on any user activity
    ['mousedown','mousemove','keydown','touchstart','scroll','click'].forEach(function(evt){
        document.addEventListener(evt, _resetIdleTimer, { passive: true });
    });
})();
</script>

<script>
/* ── ADMIN ACCESS GUARD ────────────────────────────────────────────────────────── */
(function(){
    function logSecurityViolation(user, page) {
        try {
            var violations = JSON.parse(localStorage.getItem('scpSecurityViolations') || '[]');
            var vEntry = { username: user, page: page, time: new Date().toISOString(), ua: navigator.userAgent.slice(0, 80) };
            violations.push(vEntry);
            localStorage.setItem('scpSecurityViolations', JSON.stringify(violations));
            // Also embed in the account object — survives clearing scpSecurityViolations
            try {
                var _va = JSON.parse(localStorage.getItem('approvedAccounts') || '[]');
                var _vm = _va.find(function(a){ return a.username.toLowerCase() === user.toLowerCase(); });
                if (_vm) {
                    if (!Array.isArray(_vm.violations)) _vm.violations = [];
                    _vm.violations.push(vEntry);
                    (window.DB ? DB.save("approvedAccounts", _va) : localStorage.setItem("approvedAccounts", JSON.stringify(_va)));
                }
            } catch(e) {}
        } catch(e) {}
    }
    function suspendAccount(username) {
        try {
            var accounts = JSON.parse(localStorage.getItem('approvedAccounts') || '[]');
            var acc = accounts.find(function(a){ return a.username.toLowerCase() === username.toLowerCase(); });
            if (acc && username.toLowerCase() !== 'restricted') {
                acc.suspended = true;
                acc.suspendedAt = new Date().toISOString();
                acc.suspendReason = 'Attempted unauthorised access to Admin Panel';
                (window.DB ? DB.save("approvedAccounts", accounts) : localStorage.setItem("approvedAccounts", JSON.stringify(accounts)));
                try { var d=localStorage.getItem('approvedAccounts')||'[]',h=5381; for(var i=0;i<d.length;i++) h=((h<<5)+h)^d.charCodeAt(i); localStorage.setItem('_ic',(h>>>0).toString(36)); } catch(e) {}
            }
        } catch(e) {}
    }
    function checkAdminAccess() {
        var user = localStorage.getItem('loggedInUser');
        if (!user) { window.location.href = 'Index.html'; return; }
        var accounts = JSON.parse(localStorage.getItem('approvedAccounts') || '[]');
        var me = accounts.find(function(a){ return a.username.toLowerCase() === user.toLowerCase(); });
        if (!me) { window.location.href = 'Index.html'; return; }
        var isAdmin = (me.access && me.access.includes('Admin')) || me.username.toLowerCase() === 'restricted';
        if (!isAdmin) {
            // Log violation, suspend account, sign out
            logSecurityViolation(user, 'Admin Panel');
            suspendAccount(user);
            localStorage.removeItem('loggedInUser');
            sessionStorage.clear();
            window.location.href = 'Index.html';
            return;
        }
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', checkAdminAccess);
    } else {
        checkAdminAccess();
    }

<script>
/* ── HMAC INTEGRITY SYSTEM ────────────────────────────────────────────────────
   Replaces simple djb2 checksum with HMAC-SHA256.
   Key is stored in IndexedDB — cannot be read from localStorage or console,
   making integrity hash impossible to forge externally.
────────────────────────────────────────────────────────────────────────────── */
(function(){
    var DB_NAME = 'scp_secure', STORE = 'keys', KEY_ID = 'hmac_key';

    function _openDB(cb) {
        var req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = function(e) {
            e.target.result.createObjectStore(STORE);
        };
        req.onsuccess = function(e) { cb(e.target.result); };
        req.onerror = function() { cb(null); };
    }

    function _getKey(db, cb) {
        var tx = db.transaction(STORE, 'readonly');
        var req = tx.objectStore(STORE).get(KEY_ID);
        req.onsuccess = function(e) { cb(e.target.result || null); };
        req.onerror = function() { cb(null); };
    }

    function _putKey(db, key, cb) {
        var tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).put(key, KEY_ID);
        tx.oncomplete = cb;
        tx.onerror = cb;
    }

    async function _getOrCreateKey(db) {
        return new Promise(function(resolve) {
            _getKey(db, async function(key) {
                if (key) { resolve(key); return; }
                var newKey = await crypto.subtle.generateKey(
                    { name: 'HMAC', hash: 'SHA-256' }, false, ['sign', 'verify']
                );
                _putKey(db, newKey, function() { resolve(newKey); });
            });
        });
    }

    async function _hmac(key, data) {
        var enc = new TextEncoder().encode(data);
        var sig = await crypto.subtle.sign('HMAC', key, enc);
        return Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    // Expose HMAC-based save/verify
    window._scpHMACReady = false;
    window._scpHMACKey = null;

    window._saveIntegrityHMAC = async function() {
        if (!window._scpHMACKey) return;
        try {
            var d = localStorage.getItem('approvedAccounts') || '[]';
            var mac = await _hmac(window._scpHMACKey, d);
            localStorage.setItem('_hic', mac);
        } catch(e) {}
    };

    window._verifyIntegrityHMAC = async function() {
        if (!window._scpHMACKey) return true;
        try {
            var d = localStorage.getItem('approvedAccounts') || '[]';
            var stored = localStorage.getItem('_hic');
            if (!stored) return true; // first run
            var mac = await _hmac(window._scpHMACKey, d);
            if (mac !== stored) {
                localStorage.removeItem('loggedInUser');
                sessionStorage.setItem('_tamper', '1');
                sessionStorage.clear();
                window.location.href = 'Index.html';
                return false;
            }
            return true;
        } catch(e) { return true; }
    };

    // Initialise on page load
    _openDB(async function(db) {
        if (!db) return;
        window._scpHMACKey = await _getOrCreateKey(db);
        window._scpHMACReady = true;
        // Verify on load
        window._verifyIntegrityHMAC();
    });

    // Override fnFbmOHnKY to also write HMAC after every save
    var _origSave = window.fnFbmOHnKY;
    window.fnFbmOHnKY = function() {
        if (_origSave) _origSave();
        if (window._scpHMACKey) window._saveIntegrityHMAC();
    };
})();
</script>

    if (isStudent && !studentsGroup.members.map(x => x.toLowerCase()).includes(username.toLowerCase())) studentsGroup.members.push(username);

// ── SECURITY VIOLATIONS ───────────────────────────────────────────────────────
function W0kEnydx9q() {
    const q = (document.getElementById('violation-search').value || '').toLowerCase();
    const violations = JSON.parse(localStorage.getItem('scpSecurityViolations') || '[]');
    const accounts = JSON.parse(localStorage.getItem('approvedAccounts') || '[]');
    const listEl = document.getElementById('violation-list');
    if (!listEl) return;

    // Collect suspended accounts
    const suspended = accounts.filter(a => a.suspended && a.username.toLowerCase() !== 'restricted');

    // Merge: show each suspended account with their violation entries
    let entries = suspended.map(acc => {
        const accViolations = violations.filter(v => v.username.toLowerCase() === acc.username.toLowerCase());
        return { acc, accViolations };
    });

    // Also show violations for non-suspended accounts (already reactivated but still have a record)
    const suspendedNames = suspended.map(a => a.username.toLowerCase());
    const otherViolations = violations.filter(v => !suspendedNames.includes(v.username.toLowerCase()));
    // Group by username
    const otherMap = {};
    otherViolations.forEach(v => {
        const k = v.username.toLowerCase();
        if (!otherMap[k]) otherMap[k] = [];
        otherMap[k].push(v);
    });

    if (q) {
        entries = entries.filter(e =>
            e.acc.username.toLowerCase().includes(q) ||
            e.acc.name.toLowerCase().includes(q) ||
            e.accViolations.some(v => (v.page||'').toLowerCase().includes(q))
        );
    }

    if (entries.length === 0 && Object.keys(otherMap).length === 0) {
        listEl.innerHTML = '<div class="empty-msg">// NO SECURITY VIOLATIONS //</div>';
        return;
    }

    listEl.innerHTML = '';

    // Render suspended accounts
    entries.forEach(({ acc, accViolations }) => {
        const index = accounts.indexOf(acc);
        const div = document.createElement('div');
        div.className = 'account-item';
        div.style.borderColor = '#ff3f3f';
        div.style.boxShadow = '0 0 8px rgba(255,63,63,0.2)';

        const violationLog = accViolations.length > 0
            ? accViolations.map(v =>
                `<div style="font-size:11px;color:#ff9999;margin-top:2px;">
                    ⚠ Tried to access <b>${escapeHtml(v.page || 'unknown')}</b>
                    <span style="color:#555;margin-left:8px;">${new Date(v.time).toLocaleString()}</span>
                </div>`
            ).join('')
            : '<div style="font-size:11px;color:#555;">No violation details recorded</div>';

        div.innerHTML = `
            <div class="account-info-top">
                <div><b>Name:</b> ${escapeHtml(acc.name)} ${getRoleBadge(acc)}</div>
                <div><b>Username:</b> ${escapeHtml(acc.username)}</div>
                <div><b>Email:</b> ${escapeHtml(acc.email || '—')}</div>
                <div style="margin-top:6px;padding-top:6px;border-top:1px solid #2a0000;">
                    <b style="color:#ff3f3f;">Violations:</b>
                    ${violationLog}
                </div>
                ${acc.suspendReason ? `<div style="font-size:11px;color:#ff3f3f;margin-top:4px;">⛔ Suspended: ${escapeHtml(acc.suspendReason)}</div>` : ''}
                ${acc.suspendedAt ? `<div style="font-size:11px;color:#555;">At: ${new Date(acc.suspendedAt).toLocaleString()}</div>` : ''}
            </div>
            <div class="account-controls-row">
                <button class="admin-btn" style="border-color:#3fbf3f;color:#3fbf3f;box-shadow:0 0 4px #3fbf3f;"
                    onclick="hsjaSS8VFg(${index})">✅ REACTIVATE</button>
                <button class="admin-btn delete" onclick="DG81aSQHqN(${index})">DELETE</button>
            </div>`;
        listEl.appendChild(div);
    });
}

function _debounce(fn, delay) {

    return function() {
        var args = arguments, ctx = this;
        clearTimeout(timer);
        timer = setTimeout(function(){ fn.apply(ctx, args); }, delay);
    };
}
