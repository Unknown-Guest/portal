<!DOCTYPE html>

    #nav-refresh { padding: 12px 18px; background: transparent; border: none; border-left: 1px solid var(--scp-green); color: var(--scp-green); font-size: 13px; cursor: pointer; opacity: 0.5; transition: 0.15s; margin-left: auto; }

    #subject-panel-label { padding: 10px 14px; font-size: 10px; letter-spacing: 2px; color: var(--scp-gray-text); border-bottom: 1px solid color-mix(in srgb, var(--scp-green) 10%, transparent); flex-shrink: 0; }
    #subject-list { flex: 1; overflow-y: auto; }

    .subject-item { padding: 13px 14px; border-bottom: 1px solid #0d0d0d; cursor: pointer; transition: 0.1s; }

    #content-placeholder { flex: 1; display: flex; justify-content: center; align-items: center; font-size: 12px; letter-spacing: 1.5px; color: var(--scp-green-soft); opacity: 0.5; background: var(--scp-bg, #000); }

    #content-header { padding: 14px 20px; border-bottom: 1px solid var(--scp-green); background: var(--scp-bg, #000); flex-shrink: 0; }

<script>
/* scpTheme-apply — apply saved theme before paint */
(function(){
    var t=JSON.parse(localStorage.getItem('scpTheme')||'{}');
    if(t.bg){
        document.documentElement.style.setProperty('--scp-bg',t.bg);
        document.documentElement.style.backgroundColor=t.bg;
    }
    if(t.accent){
        document.documentElement.style.setProperty('--scp-green',t.accent);
        document.documentElement.style.setProperty('--scp-green-soft',t.accent);
        var hex=t.accent.replace('#','');
        var r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);
        var lum=(0.299*r+0.587*g+0.114*b)/255;
        document.documentElement.style.setProperty('--scp-active-text',lum>0.5?'#000':'#fff');
    }
})();
</script>

<script>

window.addEventListener('error', function(e) {
    console.warn('SCP caught error:', e.message, 'at', e.filename, e.lineno);

<script>
/* ── AUTO-LOGOUT ON INACTIVITY (15 min) ──────────────────────────────────────── */
(function(){
    var IDLE_MS = 15 * 60 * 1000; // 15 minutes
    var WARN_MS = 13 * 60 * 1000; // warn at 13 minutes
    var _idleTimer, _warnTimer, _warnBanner;

    function _createWarnBanner() {
        if (_warnBanner) return;
        _warnBanner = document.createElement('div');
        _warnBanner.id = '_idle_warn';
        _warnBanner.style.cssText = 'display:none;position:fixed;top:0;left:0;right:0;z-index:999999;background:#1a1a00;color:#ffcc00;font-family:Arial,sans-serif;font-size:11px;letter-spacing:1.5px;padding:7px 14px;text-align:center;border-bottom:1px solid #ffcc00;';
        _warnBanner.innerHTML = '⏱ You will be logged out in 2 minutes due to inactivity. <button onclick="_resetIdleTimer()" style="margin-left:12px;background:#ffcc00;color:#000;border:none;padding:3px 10px;font-size:10px;font-weight:bold;cursor:pointer;letter-spacing:1px;">STAY LOGGED IN</button>';
        document.addEventListener('DOMContentLoaded', function(){ document.body.appendChild(_warnBanner); });
    }

    function _logout() {
        localStorage.removeItem('loggedInUser');
        sessionStorage.clear();
        window.location.href = 'Index.html';
    }

    window._resetIdleTimer = function() {
        clearTimeout(_idleTimer);
        clearTimeout(_warnTimer);
        if (_warnBanner) _warnBanner.style.display = 'none';
        _warnTimer = setTimeout(function(){
            if (_warnBanner) _warnBanner.style.display = 'block';
        }, WARN_MS);
        _idleTimer = setTimeout(_logout, IDLE_MS);
    };

    _createWarnBanner();
    _resetIdleTimer();

    // Reset on any user activity
    ['mousedown','mousemove','keydown','touchstart','scroll','click'].forEach(function(evt){
        document.addEventListener(evt, _resetIdleTimer, { passive: true });
    });
})();
</script>

            e.target.result.createObjectStore(STORE);

        req.onsuccess = function(e) { cb(e.target.result); };
        req.onerror = function() { cb(null); };

        var tx = db.transaction(STORE, 'readonly');

        req.onerror = function() { cb(null); };

function computeGrade(user) {
    if (!user || user.role === 'teacher') return 'teacher';
    if (!user.initialGrade || !user.gradeYear) return 7;
    const elapsed = new Date().getFullYear() - user.gradeYear;
    const g = user.initialGrade + elapsed;
    if (g > 12) return 'graduated';
    return Math.min(g, 12);
}

function canAccessTab(tab) {
    const state = getTabState(tab);
    return state === 'locked' ? 'locked' : 'full';
}

function getTabState(tab) {
    // Returns 'current' | 'archived' | 'locked' | 'full'
    if (!currentUserData) return 'locked';
    if (currentUserData.role === 'teacher' || userComputedGrade === 'graduated') return 'full';
    const g = TAB_GRADES[tab];
    if (g === 99) return 'locked';
    if (g === userComputedGrade) return 'current';
    if (g < userComputedGrade) return 'archived';
    return 'locked';
}

        } else if (state === 'archived') {
            icon = '🗂 '; extraClass = ' archived-tab';
            title = 'Archived — completed year';
        } else if (state === 'current') {
            icon = '📍 '; extraClass = ' current-tab';
            title = 'Your current year';
        } else {
            icon = ''; // teacher/graduated — no icon needed
        }

        btn.className = "sidebar-tab" + extraClass + (isActive ? " active" : "");
        btn.style.cssText = style;
        btn.title = title;
        btn.innerHTML = icon + rawLabels[tab];
        if (state !== 'locked') btn.onclick = () => switchTab(tab);
        sidebar.appendChild(btn);
    });

    // Grade tag at bottom
    let tagText = '', tagColor = getComputedStyle(document.documentElement).getPropertyValue('--scp-green').trim() || '#3fbf3f';
    if (currentUserData.role === 'teacher') { tagText = '🏫 TEACHER'; tagColor = '#ffcc00'; }
    else if (userComputedGrade === 'graduated') { tagText = '🎓 GRADUATED'; tagColor = '#ffcc00'; }
    else { tagText = `📍 YEAR ${userComputedGrade} — CURRENT`; }
    const tag = document.createElement("div");
    tag.style = `padding:10px 16px;font-size:10px;letter-spacing:1.5px;color:${tagColor};border-top:1px solid #1a1a1a;margin-top:auto;opacity:0.9;`;
    tag.innerText = tagText;
    sidebar.appendChild(tag);
}

function switchTab(tab) {
    if (canAccessTab(tab) === 'locked') return;
    activeTab = tab;
    activeSubject = null;
    activeSection = null;
    buildSidebarTabs();
    const rawLabels = { y7:"YEAR 7", y8:"YEAR 8", y9:"YEAR 9", y10:"YEAR 10", y11:"YEAR 11", y12:"YEAR 12", certs:"CERTIFICATES" };
    const state = getTabState(tab);
    const suffix = state === 'archived' ? ' — ARCHIVED' : state === 'current' ? ' — CURRENT' : '';
    document.getElementById("subject-panel-label").innerText = rawLabels[tab] + suffix;
    renderSubjectList();
    document.getElementById("content-panel").innerHTML = '<div id="content-placeholder">// SELECT A SUBJECT //</div>';
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#x27;')
        .replace(/`/g, '&#x60;');
}

function renderSubjectList() {
    const list = document.getElementById("subject-list");
    list.innerHTML = "";
    const data = SUBJECTS[activeTab];
    if (data.core && data.core.length > 0) {
        const hdr = document.createElement("div");
        hdr.style = "padding:8px 14px;font-size:10px;letter-spacing:2px;color:var(--scp-green);border-bottom:1px solid color-mix(in srgb, var(--scp-green) 15%, transparent);background:var(--scp-bg,#000);opacity:0.8;";
        hdr.innerText = "// CORE SUBJECTS";
        list.appendChild(hdr);
        data.core.forEach((s, i) => {
            const div = document.createElement("div");
            div.className = "subject-item" + (activeSection === "core" && activeSubject === i ? " active" : "");
            div.onclick = () => openSubject("core", i);
            div.innerHTML = `<div class="subject-name">${escapeHtml(s.name)}</div><div class="subject-tag">${escapeHtml(s.tag)}</div>`;
            list.appendChild(div);
        });
    }
    if (data.electives && data.electives.length > 0) {
        const hdr = document.createElement("div");
        hdr.style = "padding:8px 14px;font-size:10px;letter-spacing:2px;color:#ffcc00;border-bottom:1px solid color-mix(in srgb, var(--scp-green) 15%, transparent);border-top:1px solid #111;background:var(--scp-bg,#000);opacity:0.8;margin-top:4px;";
        hdr.innerText = activeTab === "certs" ? "// CERTIFICATES" : "// ELECTIVES";
        list.appendChild(hdr);
        data.electives.forEach((s, i) => {
            const div = document.createElement("div");
            div.className = "subject-item" + (activeSection === "elective" && activeSubject === i ? " active" : "");
            div.onclick = () => openSubject("elective", i);
            div.innerHTML = `<div class="subject-name">${escapeHtml(s.name)}</div><div class="subject-tag">${escapeHtml(s.tag)}</div>`;
            list.appendChild(div);
        });
    }
}

// ── TUTOR RESOURCES ───────────────────────────────────────────────────────────
function getTutorResources() { return JSON.parse(localStorage.getItem('scpTutorResources')) || []; }
function saveTutorResources(r) { if(window.DB) DB.save('scpTutorResources', r); else localStorage.setItem('scpTutorResources', JSON.stringify(r)); }

function getSubjectKey(tab, section, index) { return `${tab}_${section}_${index}`; }

function renderResources(subjectKey) {
    const isTeacher = currentUserData && currentUserData.role === 'teacher';
    const isAdmin = currentUserData && Array.isArray(currentUserData.access) && currentUserData.access.includes('Admin');
    const resources = getTutorResources().filter(r => r.subjectKey === subjectKey);
    const block = document.getElementById('resources-block');
    if (!block) return;

    let html = `<div class="info-block-title">TUTOR RESOURCES</div>`;

    if (isTeacher || isAdmin) {
        html += `
        <div id="upload-area" style="border:2px dashed #1a3a1a;padding:16px;text-align:center;cursor:pointer;transition:0.15s;"
             ondragover="event.preventDefault();this.style.borderColor='var(--scp-green)'"
             ondragleave="this.style.borderColor='#1a3a1a'"
             ondrop="handleResourceDrop(event,'${subjectKey}')"
             onclick="document.getElementById('res-file-input-${subjectKey.replace(/[^a-z0-9]/gi,'_')}').click()">
            <div style="font-size:11px;letter-spacing:2px;color:#2a5a2a;">📁 DRAG & DROP OR CLICK TO UPLOAD</div>
        </div>
        <input type="file" id="res-file-input-${subjectKey.replace(/[^a-z0-9]/gi,'_')}" style="display:none" accept=".pdf,.doc,.docx,.txt,.png,.jpg,.jpeg,.gif,.mp4,.pptx,.xlsx" onchange="handleResourceSelect(event,'${subjectKey}')"/>
        <div id="upload-meta-${subjectKey.replace(/[^a-z0-9]/gi,'_')}" style="display:none;flex-direction:column;gap:8px;padding:10px;border:1px solid #1a1a1a;">
            <div style="font-size:10px;letter-spacing:1.5px;color:var(--scp-green-soft);">RESOURCE DETAILS</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <select id="res-term" style="padding:6px 10px;background:#050505;border:1px solid var(--scp-green);color:var(--scp-green);font-size:12px;outline:none;cursor:pointer;">
                    <option value="">TERM...</option><option>Term 1</option><option>Term 2</option><option>Term 3</option><option>Term 4</option>
                </select>
                <select id="res-week" style="padding:6px 10px;background:#050505;border:1px solid var(--scp-green);color:var(--scp-green);font-size:12px;outline:none;cursor:pointer;">
                    <option value="">WEEK...</option>${[...Array(10)].map((_,i)=>`<option>Week ${i+1}</option>`).join('')}
                </select>
                <select id="res-lesson" style="padding:6px 10px;background:#050505;border:1px solid var(--scp-green);color:var(--scp-green);font-size:12px;outline:none;cursor:pointer;">
                    <option value="">LESSON...</option><option>Lesson 1</option><option>Lesson 2</option><option>Lesson 3</option><option>Lesson 4</option><option>Lesson 5</option>
                </select>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <span id="res-pending-name" style="font-size:11px;color:var(--scp-gray-text);flex:1;"></span>
                <button onclick="confirmResourceUpload('${subjectKey}')" style="padding:7px 14px;background:var(--scp-green);color:#000;border:none;font-size:11px;font-weight:bold;letter-spacing:1.5px;cursor:pointer;">▶ UPLOAD</button>
                <button onclick="cancelResourceUpload('${subjectKey.replace(/[^a-z0-9]/gi,'_')}')" style="padding:7px 14px;background:transparent;border:1px solid #333;color:#666;font-size:11px;cursor:pointer;">✕</button>
            </div>
        </div>`;
    }

    if (resources.length === 0) {
        html += `<div class="coming-soon"><div class="coming-soon-icon">📂</div><div class="coming-soon-text">// NO RESOURCES YET //</div></div>`;
    } else {
        // Group by Term > Week > Lesson
        const grouped = {};
        resources.forEach(r => {
            const t = r.term || 'No Term', w = r.week || 'No Week';
            if (!grouped[t]) grouped[t] = {};
            if (!grouped[t][w]) grouped[t][w] = [];
            grouped[t][w].push(r);
        });
        html += `<div style="display:flex;flex-direction:column;gap:12px;">`;
        Object.keys(grouped).sort().forEach(term => {
            html += `<div style="border-left:2px solid var(--scp-green);padding-left:12px;">
                <div style="font-size:10px;letter-spacing:2px;color:var(--scp-green);margin-bottom:6px;">${term}</div>`;
            Object.keys(grouped[term]).sort().forEach(week => {
                html += `<div style="margin-bottom:8px;">
                    <div style="font-size:10px;letter-spacing:1.5px;color:var(--scp-gray-text);margin-bottom:4px;">${week}</div>`;
                grouped[term][week].forEach(r => {
                    const canDel = isAdmin || (isTeacher && r.uploadedBy === currentUserData.username);
                    html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid #1a1a1a;background:#030303;margin-bottom:4px;">
                        <span style="font-size:18px;">📄</span>
                        <div style="flex:1;">
                            <div style="font-size:12px;color:var(--scp-green);">${escapeHtml(r.title)}</div>
                            <div style="font-size:10px;color:var(--scp-gray-text);">${escapeHtml(r.lesson || '')} · ${escapeHtml(r.fileName)} · by ${escapeHtml(r.uploadedBy)}</div>
                        </div>
                        <a href="${(typeof r.fileData==='string'&&/^data:[a-zA-Z0-9+\/]+;base64,/.test(r.fileData))?r.fileData:'#'}" download="${escapeHtml(r.fileName)}" style="padding:4px 10px;border:1px solid var(--scp-green);color:var(--scp-green);font-size:10px;letter-spacing:1px;text-decoration:none;cursor:pointer;">⬇ SAVE</a>
                        ${canDel ? `<button onclick="deleteResource('${r.id}')" style="padding:4px 8px;border:1px solid var(--scp-red);color:var(--scp-red);background:transparent;font-size:10px;cursor:pointer;">✕</button>` : ''}
                    </div>`;
                });
                html += `</div>`;
            });
            html += `</div>`;
        });
        html += `</div>`;
    }
    block.innerHTML = html;
}

let pendingResourceFile = null;
let pendingResourceSubjectKey = null;

function handleResourceDrop(event, subjectKey) {
    event.preventDefault();
    document.getElementById('upload-area').style.borderColor = '#1a3a1a';
    const file = event.dataTransfer.files[0];
    if (file) showResourceMeta(file, subjectKey);
}

function handleResourceSelect(event, subjectKey) {
    const file = event.target.files[0];
    if (file) showResourceMeta(file, subjectKey);
}

function showResourceMeta(file, subjectKey) {
    pendingResourceFile = file;
    pendingResourceSubjectKey = subjectKey;
    const safeKey = subjectKey.replace(/[^a-z0-9]/gi,'_');
    document.getElementById(`res-pending-name`).innerText = file.name;
    const metaDiv = document.getElementById(`upload-meta-${safeKey}`);
    metaDiv.style.display = 'flex';
}

function cancelResourceUpload(safeKey) {
    pendingResourceFile = null;
    document.getElementById(`upload-meta-${safeKey}`).style.display = 'none';
}

function confirmResourceUpload(subjectKey) {
    if (!pendingResourceFile) return;
    const term = document.getElementById('res-term').value;
    const week = document.getElementById('res-week').value;
    const lesson = document.getElementById('res-lesson').value;
    if (!term || !week || !lesson) { alert('Please select Term, Week and Lesson.'); return; }

    // Validate file type and size before reading
    const ALLOWED_TYPES = ['application/pdf','application/msword',
        'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
        'application/vnd.ms-powerpoint',
        'application/vnd.openxmlformats-officedocument.presentationml.presentation',
        'application/vnd.ms-excel',
        'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
        'text/plain','image/png','image/jpeg','image/gif','image/webp'];
    const ALLOWED_EXTS = ['pdf','doc','docx','ppt','pptx','xls','xlsx','txt','png','jpg','jpeg','gif','webp'];
    const ext = pendingResourceFile.name.split('.').pop().toLowerCase();
    const type = pendingResourceFile.type;
    if (!ALLOWED_EXTS.includes(ext) || (!ALLOWED_TYPES.includes(type) && type !== '')) {
        alert('File type not allowed. Permitted: PDF, Word, PowerPoint, Excel, plain text, images.'); return;
    }
    if (pendingResourceFile.size > 5 * 1024 * 1024) {
        alert('File too large. Maximum size is 5MB.'); return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        // Verify the data URI starts with a safe base64 prefix
        const dataUri = e.target.result;
        if (typeof dataUri !== 'string' || !/^data:[a-zA-Z0-9+/]+;base64,/.test(dataUri)) {
            alert('File could not be read safely.'); return;
        }
        const resources = getTutorResources();
        resources.push({
            id: Date.now().toString(),
            subjectKey,
            title: pendingResourceFile.name.replace(/\.[^.]+$/, ''),
            fileName: pendingResourceFile.name,
            fileData: dataUri,
            term, week, lesson,
            uploadedBy: currentUserData.username,
            uploadedAt: Date.now()
        });
        saveTutorResources(resources);
        pendingResourceFile = null;
        renderResources(subjectKey);
    };
    reader.readAsDataURL(pendingResourceFile);
}

function deleteResource(id) {
    if (!confirm('Delete this resource?')) return;
    saveTutorResources(getTutorResources().filter(r => r.id !== id));
    renderResources(pendingResourceSubjectKey || '');
}

function openSubject(section, index) {
    activeSection = section;
    activeSubject = index;
    renderSubjectList();
    const s = SUBJECTS[activeTab][section === "core" ? "core" : "electives"][index];
    const panel = document.getElementById("content-panel");
    const isCore = section === "core";
    const topicBadges = s.topics.map(t => `<span class="info-badge${isCore ? "" : " gold"}">${t}</span>`).join("");
    const subjectKey = getSubjectKey(activeTab, section, index);

    panel.innerHTML = `
        <div id="content-header">
            <div id="content-header-name">${escapeHtml(s.name).toUpperCase()}</div>
            <div id="content-header-sub">${isCore ? "Core Subject" : activeTab === "certs" ? "VET Certificate" : "Elective"} &nbsp;·&nbsp; ${s.tag}</div>
        </div>
        <div id="content-body">
            <div class="info-block">
                <div class="info-block-title">OVERVIEW</div>
                <div class="info-block-body">${s.description}</div>
            </div>
            <div class="info-block">
                <div class="info-block-title">KEY TOPICS</div>
                <div class="info-block-body">${topicBadges}</div>
            </div>
            <div class="info-block" id="resources-block"></div>
        </div>
    `;
    renderResources(subjectKey);
}

window.onload = async function() { if(window.DB) await DB._initPromise;

    const username = localStorage.getItem("loggedInUser");
    if (!username) { window.location.href = "Index.html"; return; }
    const accounts = JSON.parse(localStorage.getItem("approvedAccounts")) || [];
    currentUserData = accounts.find(a => a.username.toLowerCase() === username.toLowerCase());
    if (!currentUserData || !Array.isArray(currentUserData.access) || !currentUserData.access.includes("Tutors")) {
        document.getElementById("main").innerHTML =
            '<div style="flex:1;display:flex;justify-content:center;align-items:center;font-size:12px;letter-spacing:1.5px;color:var(--scp-green-soft);opacity:0.5;">// ACCESS DENIED //</div>';
        return;
    }
    userComputedGrade = computeGrade(currentUserData);
    // Auto-set initial tab to user's grade
    if (currentUserData.role !== 'teacher' && userComputedGrade !== 'graduated') {
        const gradeToTab = {7:'y7',8:'y8',9:'y9',10:'y10',11:'y11',12:'y12'};
        activeTab = gradeToTab[userComputedGrade] || 'y7';
    }
    buildSidebarTabs();
    const rawLabels = { y7:"YEAR 7", y8:"YEAR 8", y9:"YEAR 9", y10:"YEAR 10", y11:"YEAR 11", y12:"YEAR 12", certs:"CERTIFICATES" };
    const initState = getTabState(activeTab);
    const initSuffix = initState === 'archived' ? ' — ARCHIVED' : initState === 'current' ? ' — CURRENT' : '';
    document.getElementById("subject-panel-label").innerText = rawLabels[activeTab] + initSuffix;
    renderSubjectList();
};
</script>

<script>
/* scpTheme-postload */
(function(){
    var t=JSON.parse(localStorage.getItem('scpTheme')||'{}');
    if(!t.bg && !t.accent) return;
    function applyEl(id){ var el=document.getElementById(id); if(el&&t.bg) el.style.backgroundColor=t.bg; }
    function run(){ applyEl('header'); applyEl('navbar'); if(t.bg) document.body.style.backgroundColor=t.bg; }
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',run);
    else run();
})();
</script>
