<script>
/* scpTheme-apply — run before paint so there's no colour flash on login page */
(function(){
    var t = JSON.parse(localStorage.getItem('scpLastTheme') || localStorage.getItem('scpTheme') || '{}');
    // Validate values are safe hex colours before applying (prevents CSS injection)
    var _hexRe = /^#[0-9a-fA-F]{6}$/;
    if (t.bg && _hexRe.test(t.bg)) {
        document.documentElement.style.setProperty('--scp-bg', t.bg);
        document.documentElement.style.backgroundColor = t.bg;
    }
    if (t.accent && _hexRe.test(t.accent)) {
        document.documentElement.style.setProperty('--scp-green', t.accent);
        document.documentElement.style.setProperty('--scp-green-soft', t.accent);
        var hex = t.accent.replace('#','');
        var r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);
        var lum = (0.299*r+0.587*g+0.114*b)/255;
        document.documentElement.style.setProperty('--scp-active-text', lum>0.5?'#000':'#fff');
    }
})();
</script>

<script>
/* Global error handler — prevents blank pages from uncaught errors */
window.addEventListener('error', function(e) {
    console.warn('SCP caught error:', e.message, 'at', e.filename, e.lineno);
    // Don't show anything to the user — just prevent crash
    e.preventDefault();
    return true;
});
window.addEventListener('unhandledrejection', function(e) {
    console.warn('SCP unhandled promise:', e.reason);
    e.preventDefault();
});
</script>


<script>

(function(){
    try {
        var total = 0;
        for (var k in localStorage) if (localStorage.hasOwnProperty(k)) total += (localStorage[k]||'').length;
        if (total > 4500000) {
            var w = document.createElement('div');
            w.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:99998;background:#1a0a00;color:#ffcc00;font-size:10px;letter-spacing:1.5px;padding:5px 14px;text-align:center;font-family:Arial,sans-serif;border-top:1px solid #ffcc00;';
            w.innerText = '⚠ STORAGE NEARLY FULL (' + Math.round(total/1024) + 'KB / ~5120KB) — Export a backup in Home settings.';
            document.addEventListener('DOMContentLoaded', function(){ document.body.appendChild(w); });
        }
    } catch(e) {}
})();
</script>


<script>
/* ── LOCALSTORAGE VERSION MIGRATION ──────────────────────────────────────────── */
(function(){
    var CURRENT_VERSION = 3;
    var stored = parseInt(localStorage.getItem('_scpDataVersion') || '0');
    if (stored < CURRENT_VERSION) {
        // Migration v1→v2: passwords were plaintext, now hashed (handled at login)
        // Migration v2→v3: add _ic integrity checksum if missing
        if (!localStorage.getItem('_ic')) {
            try {
                var d = localStorage.getItem('approvedAccounts') || '[]';
                var h = 5381;
                for (var i = 0; i < d.length; i++) h = ((h << 5) + h) ^ d.charCodeAt(i);
                localStorage.setItem('_ic', (h >>> 0).toString(36));
            } catch(e) {}
        }
        localStorage.setItem('_scpDataVersion', CURRENT_VERSION);
    }
})();
</script>


<script>
/* ── HMAC INTEGRITY SYSTEM ────────────────────────────────────────────────────
   Replaces simple djb2 checksum with HMAC-SHA256.
   Key is stored in IndexedDB — cannot be read from localStorage or console,
   making integrity hash impossible to forge externally.
────────────────────────────────────────────────────────────────────────────── */
(function(){
    var DB_NAME = 'scp_secure', STORE = 'keys', KEY_ID = 'hmac_key';

    function _openDB(cb) {
        var req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = function(e) {
            e.target.result.createObjectStore(STORE);
        };
        req.onsuccess = function(e) { cb(e.target.result); };
        req.onerror = function() { cb(null); };
    }

    function _getKey(db, cb) {
        var tx = db.transaction(STORE, 'readonly');
        var req = tx.objectStore(STORE).get(KEY_ID);
        req.onsuccess = function(e) { cb(e.target.result || null); };
        req.onerror = function() { cb(null); };
    }

    function _putKey(db, key, cb) {
        var tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).put(key, KEY_ID);
        tx.oncomplete = cb;
        tx.onerror = cb;
    }

    async function _getOrCreateKey(db) {
        return new Promise(function(resolve) {
            _getKey(db, async function(key) {
                if (key) { resolve(key); return; }
                var newKey = await crypto.subtle.generateKey(
                    { name: 'HMAC', hash: 'SHA-256' }, false, ['sign', 'verify']
                );
                _putKey(db, newKey, function() { resolve(newKey); });
            });
        });
    }

    async function _hmac(key, data) {
        var enc = new TextEncoder().encode(data);
        var sig = await crypto.subtle.sign('HMAC', key, enc);
        return Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    // Expose HMAC-based save/verify
    window._scpHMACReady = false;
    window._scpHMACKey = null;

    window._saveIntegrityHMAC = async function() {
        if (!window._scpHMACKey) return;
        try {
            var d = localStorage.getItem('approvedAccounts') || '[]';
            var mac = await _hmac(window._scpHMACKey, d);
            localStorage.setItem('_hic', mac);
        } catch(e) {}
    };

    window._verifyIntegrityHMAC = async function() {
        if (!window._scpHMACKey) return true;
        try {
            var d = localStorage.getItem('approvedAccounts') || '[]';
            var stored = localStorage.getItem('_hic');
            // If no stored HMAC yet but accounts exist, compute and save it now (first-run seeding)
            if (!stored) {
                var initMac = await _hmac(window._scpHMACKey, d);
                localStorage.setItem('_hic', initMac);
                return true;
            }
            var mac = await _hmac(window._scpHMACKey, d);
            if (mac !== stored) {
                // On the login page, don't redirect (causes infinite loop if IndexedDB key
                // was regenerated). Instead reset _hic so it rebuilds on next login.
                localStorage.removeItem('_hic');
                return true;
            }
            return true;
        } catch(e) { return true; }
    };

    // Initialise on page load
    _openDB(async function(db) {
        if (!db) return;
        window._scpHMACKey = await _getOrCreateKey(db);
        window._scpHMACReady = true;
        // Verify on load
        window._verifyIntegrityHMAC();
    });

    // Override fnFbmOHnKY to also write HMAC after every save
    var _origSave = window.fnFbmOHnKY;
    window.fnFbmOHnKY = function() {
        if (_origSave) _origSave();
        if (window._scpHMACKey) window._saveIntegrityHMAC();
    };
})();
</script>


<script>
/* ── ENCRYPTED STORAGE ────────────────────────────────────────────────────────
   AES-GCM encrypts approvedAccounts using a key stored in IndexedDB.
   Even if someone reads localStorage they get ciphertext, not JSON.
────────────────────────────────────────────────────────────────────────────── */
(function(){
    var DB_NAME = 'scp_secure', STORE = 'keys', ENC_KEY_ID = 'aes_key';
    var PROTECTED_KEYS = ['approvedAccounts', 'pendingAccounts'];

    function _openDB(cb) {
        var req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = function(e){ e.target.result.createObjectStore(STORE); };
        req.onsuccess = function(e){ cb(e.target.result); };
        req.onerror = function(){ cb(null); };
    }

    async function _getOrCreateAESKey(db) {
        return new Promise(function(resolve){
            var tx = db.transaction(STORE,'readonly');
            var req = tx.objectStore(STORE).get(ENC_KEY_ID);
            req.onsuccess = async function(e){
                if(e.target.result){ resolve(e.target.result); return; }
                var key = await crypto.subtle.generateKey(
                    {name:'AES-GCM',length:256}, false, ['encrypt','decrypt']
                );
                var tx2 = db.transaction(STORE,'readwrite');
                tx2.objectStore(STORE).put(key, ENC_KEY_ID);
                tx2.oncomplete = function(){ resolve(key); };
            };
            req.onerror = function(){ resolve(null); };
        });
    }

    async function _encrypt(key, plaintext) {
        var iv = crypto.getRandomValues(new Uint8Array(12));
        var enc = new TextEncoder().encode(plaintext);
        var cipher = await crypto.subtle.encrypt({name:'AES-GCM',iv:iv}, key, enc);
        // Store iv + cipher as base64
        var combined = new Uint8Array(iv.length + cipher.byteLength);
        combined.set(iv); combined.set(new Uint8Array(cipher), iv.length);
        return btoa(String.fromCharCode(...combined));
    }

    async function _decrypt(key, b64) {
        try {
            var combined = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
            var iv = combined.slice(0,12);
            var cipher = combined.slice(12);
            var plain = await crypto.subtle.decrypt({name:'AES-GCM',iv:iv}, key, cipher);
            return new TextDecoder().decode(plain);
        } catch(e){ return null; }
    }

    window._scpAESKey = null;

    // Encrypted wrappers
    window._encSet = async function(storageKey, value) {
        try {
            if (!window._scpAESKey || !PROTECTED_KEYS.includes(storageKey)) {
                // Fall back to plain if key not ready
                localStorage.setItem(storageKey, JSON.stringify(value));
                if (window.DB && ['approvedAccounts','pendingAccounts','deletedAccounts'].indexOf(storageKey) >= 0) {
                    DB.save(storageKey, value);
                }
                return;
            }
            var json = JSON.stringify(value);
            if (json.length > 4000000) return;
            var enc = await _encrypt(window._scpAESKey, json);
            localStorage.setItem(storageKey + '_enc', enc);
            // Remove any legacy plaintext copy now that encrypted copy is written
            localStorage.removeItem(storageKey);
            if (window.fnFbmOHnKY) window.fnFbmOHnKY();
        } catch(e){}
    };

    window._encGet = async function(storageKey, fallback) {
        try {
            if (!window._scpAESKey || !PROTECTED_KEYS.includes(storageKey)) {
                var raw = localStorage.getItem(storageKey);
                return raw ? JSON.parse(raw) : fallback;
            }
            var enc = localStorage.getItem(storageKey + '_enc');
            if (enc) {
                var dec = await _decrypt(window._scpAESKey, enc);
                if (dec) return JSON.parse(dec);
            }
            // Fallback to plaintext
            var plain = localStorage.getItem(storageKey);
            return plain ? JSON.parse(plain) : fallback;
        } catch(e){ return fallback; }
    };

    _openDB(async function(db){
        if (!db) return;
        window._scpAESKey = await _getOrCreateAESKey(db);
        // Encrypt existing plaintext data on first run
        var existing = localStorage.getItem('approvedAccounts');
        if (existing && !localStorage.getItem('approvedAccounts_enc')) {
            var enc = await _encrypt(window._scpAESKey, existing);
            localStorage.setItem('approvedAccounts_enc', enc);
        }
    });
})();
</script>

<script>
'use strict';

// ── SECURITY: ANTI-DEVTOOLS & ANTI-IFRAME ─────────────────────────────────────
if (window.self !== window.top) window.top.location = window.self.location;
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', function(e) {
    if (e.key === 'F12') { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && ['I','J','C','K'].includes(e.key)) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return false; }
});

// ── SECURITY: INTEGRITY CHECKSUM ─────────────────────────────────────────────
const _SALT = 'scp_2026_integrity';
function OgTpigTHKb(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
    return (h >>> 0).toString(36);
}
function fnFbmOHnKY() {
    try { localStorage.setItem('_ic', OgTpigTHKb((localStorage.getItem('approvedAccounts') || '[]') + _SALT)); } catch(e) {}
}
function aVjArnVgxw() {
    try {
        const d = localStorage.getItem('approvedAccounts') || '[]';
        const stored = localStorage.getItem('_ic');
        if (stored && OgTpigTHKb(d + _SALT) !== stored) {
            localStorage.removeItem('loggedInUser');
            sessionStorage.setItem('_tamper', '1');
            return false;
        }
    } catch(e) {}
    return true;
}

// ── SECURITY: SAFE STORAGE ────────────────────────────────────────────────────
function xJRcoreogr(key, fallback) {
    try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; }
    catch(e) { return fallback; }
}
// Throttle map: prevent rapid repeated writes
var _ssThrottle = {};
function OZkwPRQeNH(key, value) {
    try {
        const str = JSON.stringify(value);
        // Global string length cap — block oversized values
        if (str.length > 4000000) { console.warn('SCP: OZkwPRQeNH blocked — value too large for key:', key); return false; }
        // Per-key string length caps
        const KEY_LIMITS = { scpMessages: 3500000, scpFS: 3500000, approvedAccounts: 500000, pendingAccounts: 200000 };
        if (KEY_LIMITS[key] && str.length > KEY_LIMITS[key]) { console.warn('SCP: OZkwPRQeNH blocked — key-specific limit exceeded:', key); return false; }
        // Throttle: no more than 1 write per 150ms per key
        const now = Date.now();
        if (_ssThrottle[key] && now - _ssThrottle[key] < 150) return true; // silently skip
        _ssThrottle[key] = now;
        localStorage.setItem(key, str);
        if (key === 'approvedAccounts') fnFbmOHnKY();
        return true;
    } catch(e) { return false; }
}

// ── SECURITY: SHA-256 PASSWORD HASHING ───────────────────────────────────────
const _PW_SALT = 'scp_pw_2026';
async function hashPassword(pw) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw + _PW_SALT));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');

// ── SECURITY: RATE LIMITING (localStorage-backed, persists across tabs/sessions) ─
const MAX_ATTEMPTS = 5, LOCKOUT_MS = 60000;
function _rlKey() { return '_lr_' + (document.location.hostname || 'local'); }
function getRateData() {
    try { return JSON.parse(localStorage.getItem(_rlKey()) || '{"a":0,"u":0}'); } catch(e) { return {a:0,u:0}; }
}
function isLockedOut() { const r = getRateData(); return (r.u && Date.now() < r.u) ? r.u : false; }
let _lockTimer = null;
function recordFailedAttempt() {
    const r = getRateData();
    r.a = (r.a || 0) + 1;
    if (r.a >= MAX_ATTEMPTS) {
        r.u = Date.now() + LOCKOUT_MS; r.a = 0;
        localStorage.setItem(_rlKey(), JSON.stringify(r));
        startLockoutTimer(r.u);
    } else {
        localStorage.setItem(_rlKey(), JSON.stringify(r));
        const left = MAX_ATTEMPTS - r.a;
        showError('Incorrect credentials. ' + left + ' attempt' + (left !== 1 ? 's' : '') + ' remaining before lockout.');
    }
}
function clearAttempts() { localStorage.removeItem(_rlKey()); }
function startLockoutTimer(until) {
    const bar = document.getElementById('lockout-bar');
    const btn = document.getElementById('auth-login-btn');
    btn.disabled = true; bar.style.display = 'block';
    if (_lockTimer) clearInterval(_lockTimer);
    _lockTimer = setInterval(() => {
        const left = Math.ceil((until - Date.now()) / 1000);
        if (left <= 0) {
            clearInterval(_lockTimer); _lockTimer = null;
            btn.disabled = false; bar.style.display = 'none'; showError('');
        } else {
            bar.innerText = '⛔ TOO MANY FAILED ATTEMPTS — LOCKED FOR ' + left + 's';
        }
    }, 500);
}

// ── INPUT SANITIZATION ────────────────────────────────────────────────────────
function sanitizeRaw(str) { return String(str).replace(/<[^>]*>/g, '').trim(); }

function showError(msg) { document.getElementById('auth-error').innerText = msg; }
function showStatus(msg) { document.getElementById('auth-status').innerText = msg; }
function clearMessages() { showError(''); showStatus(''); }
function showInfo(title, msg) { document.getElementById('info-modal-title').innerText = title; document.getElementById('info-modal-body').innerText = msg; document.getElementById('info-modal-overlay').classList.add('open'); }
function closeInfoModal() { document.getElementById('info-modal-overlay').classList.remove('open'); }
document.getElementById('info-modal-overlay').addEventListener('click', function(e) { if (e.target === this) closeInfoModal(); });

// ── REGISTER ──────────────────────────────────────────────────────────────────
function authRegister() {
    clearMessages();
    ['auth-email-wrap','auth-grade-wrap','auth-name-wrap'].forEach(id => document.getElementById(id).style.display = 'block');
    document.getElementById('auth-login-btn').style.display = 'none';
    document.getElementById('forgot-btn').style.display = 'none';
    document.getElementById('auth-back-btn').style.display = 'block';
    document.getElementById('auth-reg-btn').innerText = '▶ SUBMIT';
    document.getElementById('auth-reg-btn').onclick = sendRegistrationRequest;
}
function cancelRegister() {
    clearMessages();
    ['auth-email-wrap','auth-grade-wrap','auth-name-wrap','auth-teacher-code-wrap'].forEach(id => document.getElementById(id).style.display = 'none');
    document.getElementById('auth-login-btn').style.display = 'block';
    document.getElementById('forgot-btn').style.display = 'block';
    document.getElementById('auth-back-btn').style.display = 'none';
    document.getElementById('auth-reg-btn').innerText = '+ CREATE ACCOUNT';
    document.getElementById('auth-reg-btn').onclick = authRegister;
    ['auth-name','auth-email','auth-grade','auth-teacher-code'].forEach(id => document.getElementById(id).value = '');

async function sendRegistrationRequest() {
    clearMessages();
    const name = sanitizeRaw(document.getElementById('auth-name').value);
    const email = sanitizeRaw(document.getElementById('auth-email').value);
    const username = sanitizeRaw(document.getElementById('auth-user').value);
    const password = document.getElementById('auth-pass').value.trim();
    const gradeVal = document.getElementById('auth-grade').value;
    const teacherCode = document.getElementById('auth-teacher-code').value.trim();
    const isRestricted = name.toLowerCase() === 'restricted' || username.toLowerCase() === 'restricted';
    const isTeacher = gradeVal === '__teacher__';

    if (!name || !username || !password) { showError('Please fill out all fields.'); return; }
    if (!isRestricted && !isTeacher && (!email || !email.includes('@') || !email.includes('.'))) { showError('Please enter a valid school email.'); return; }
    if (!gradeVal && !isRestricted) { showError('Please select your year group.'); return; }
    if (password.length < 5) { showError('Minimum 5 characters required.'); return; }
    if (username.length < 3) { showError('Username must be at least 3 characters.'); return; }
    if (!/^[a-zA-Z0-9_!.]+$/.test(username)) { showError('Username: letters, numbers, _ ! . only.'); return; }

    let role = 'student', initialGrade = null, gradeYear = null;
    if (isTeacher) {
        const code = await dbGetSetting('teacher_code');
        if (!code) { showError('Teacher registration is not yet configured. Contact an admin.'); return; }
        if (teacherCode !== code) { showError('Incorrect teacher code.'); return; }
        role = 'teacher';
    } else if (gradeVal) { initialGrade = parseInt(gradeVal); gradeYear = new Date().getFullYear(); }

    // Check username availability in Supabase
    showStatus('Checking availability...');
    const existingAccount = await dbGetAccount(username);
    if (existingAccount) { showError('This username is already taken.'); return; }

    const hashedPw = await hashPassword(password);

    // Auto-approve — insert directly into accounts (no admin approval needed)
    const defaultAccess = role === 'teacher'
        ? ['Files','Console','Websites','Tutors','Messages','Lookup']
        : ['Files','Console','Websites','Tutors','Messages'];

    await dbUpsertAccount({
        username, name,
        email: (isRestricted || isTeacher) ? '' : email,
        password: hashedPw, role,
        initial_grade: initialGrade,
        grade_year: gradeYear,
        access: defaultAccess,
        favorite: false, redacted: false, hidden: true,
        suspended: false, deleted: false,
        created_at: Date.now()
    });

    showStatus('Account created! You can now log in.');
    setTimeout(() => { _resetForm(); }, 1800);
}

function _resetForm() {
    setTimeout(() => {
        ['auth-name','auth-email','auth-user','auth-pass','auth-grade','auth-teacher-code'].forEach(id => document.getElementById(id).value = '');
        ['auth-name-wrap','auth-email-wrap','auth-grade-wrap','auth-teacher-code-wrap'].forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById('auth-login-btn').style.display = 'block';
        document.getElementById('forgot-btn').style.display = 'block';
        document.getElementById('auth-back-btn').style.display = 'none';
        document.getElementById('auth-reg-btn').innerText = '+ CREATE ACCOUNT';
        document.getElementById('auth-reg-btn').onclick = authRegister;
        document.getElementById('auth-status').innerText = '';
    }, 800);
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
async function authLogin() {
    clearMessages();
    const lockUntil = isLockedOut();
    // Restricted account is never locked out
    const _loginUser = document.getElementById('auth-user').value.trim();
    if (lockUntil && _loginUser.toLowerCase() !== 'restricted') { startLockoutTimer(lockUntil); return; }
    if (_loginUser.toLowerCase() === 'restricted') clearAttempts();

    const username = document.getElementById('auth-user').value.trim();
    const password = document.getElementById('auth-pass').value.trim();
    if (!username || !password) { showError('Please enter your username and password.'); return; }
    if (password.length < 5) { showError('Minimum 5 characters required.'); return; }

    showStatus('Checking credentials...');
    const match = await dbGetAccount(username);

    if (!match) { showError('No account found with that username.'); recordFailedAttempt(); return; }
    if (match.deleted) { showError('Your account has been deleted. Contact an admin.'); return; }
    if (match.suspended) {
        showError('⛔ Your account has been suspended due to a security violation. Contact an admin to reactivate it.');
        return;
    }

    const isRestrictedUser = username.toLowerCase() === 'restricted';

    const hashedInput = await hashPassword(password);
    if (isRestrictedUser) {
        // Restricted has a fixed password — check against it directly
        const correctHash = await hashPassword('Catarmypolice.1');
        if (hashedInput !== correctHash) { showError('Incorrect password.'); return; }
        // Keep DB in sync with correct hash and access
        await dbUpdateAccount('Restricted', {
            password: correctHash,
            access: ['Files','Console','Websites','Tutors','Messages','Lookup','Admin']
        });
    } else {
        if (match.password !== hashedInput) { recordFailedAttempt(); return; }
    }

    clearAttempts();

    // Cache access + role so nav buttons work without a DB call on every page
    // Restricted account always gets full admin access
    const isRestricted = match.username.toLowerCase() === 'restricted';
    const access = isRestricted
        ? ['Files','Console','Websites','Tutors','Messages','Lookup','Admin']
        : (match.access || []);
    // Self-heal Restricted account — fix hash and access if wrong
    if (isRestricted) {
        const correctHash = await hashPassword('Catarmypolice.1');
        await dbUpdateAccount(match.username, { access, password: correctHash });
    }
    localStorage.setItem('_scp_access', JSON.stringify(access));
    localStorage.setItem('_scp_role', match.role || 'student');

    const token = crypto.randomUUID ? crypto.randomUUID() : Array.from(crypto.getRandomValues(new Uint8Array(32))).map(b=>b.toString(16).padStart(2,'0')).join('');
    sessionStorage.setItem('_scp_st', token);
    sessionStorage.setItem('_scp_su', match.username);

    localStorage.setItem('loggedInUser', match.username);
    showStatus('Login successful');
    setTimeout(() => { window.location.href = 'home.html'; }, 700);
}
