<script>
/* scpTheme-apply — apply saved theme before paint */
(function(){
    var t=JSON.parse(localStorage.getItem('scpTheme')||'{}');
    if(t.bg){
        document.documentElement.style.setProperty('--scp-bg',t.bg);
        document.documentElement.style.backgroundColor=t.bg;
    }
    if(t.accent){
        document.documentElement.style.setProperty('--scp-green',t.accent);
        document.documentElement.style.setProperty('--scp-green-soft',t.accent);
        var hex=t.accent.replace('#','');
        var r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);
        var lum=(0.299*r+0.587*g+0.114*b)/255;
        document.documentElement.style.setProperty('--scp-active-text',lum>0.5?'#000':'#fff');
    }
})();
</script>

<script>

window.addEventListener('error', function(e) {
    console.warn('SCP caught error:', e.message, 'at', e.filename, e.lineno);

<script>
/* ── AUTO-LOGOUT ON INACTIVITY (15 min) ──────────────────────────────────────── */
(function(){
    var IDLE_MS = 15 * 60 * 1000; // 15 minutes
    var WARN_MS = 13 * 60 * 1000; // warn at 13 minutes
    var _idleTimer, _warnTimer, _warnBanner;

    function _createWarnBanner() {
        if (_warnBanner) return;
        _warnBanner = document.createElement('div');
        _warnBanner.id = '_idle_warn';
        _warnBanner.style.cssText = 'display:none;position:fixed;top:0;left:0;right:0;z-index:999999;background:#1a1a00;color:#ffcc00;font-family:Arial,sans-serif;font-size:11px;letter-spacing:1.5px;padding:7px 14px;text-align:center;border-bottom:1px solid #ffcc00;';
        _warnBanner.innerHTML = '⏱ You will be logged out in 2 minutes due to inactivity. <button onclick="_resetIdleTimer()" style="margin-left:12px;background:#ffcc00;color:#000;border:none;padding:3px 10px;font-size:10px;font-weight:bold;cursor:pointer;letter-spacing:1px;">STAY LOGGED IN</button>';
        document.addEventListener('DOMContentLoaded', function(){ document.body.appendChild(_warnBanner); });
    }

    function _logout() {
        localStorage.removeItem('loggedInUser');
        sessionStorage.clear();
        window.location.href = 'Index.html';
    }

    window._resetIdleTimer = function() {
        clearTimeout(_idleTimer);
        clearTimeout(_warnTimer);
        if (_warnBanner) _warnBanner.style.display = 'none';
        _warnTimer = setTimeout(function(){
            if (_warnBanner) _warnBanner.style.display = 'block';
        }, WARN_MS);
        _idleTimer = setTimeout(_logout, IDLE_MS);
    };

    _createWarnBanner();
    _resetIdleTimer();

    // Reset on any user activity
    ['mousedown','mousemove','keydown','touchstart','scroll','click'].forEach(function(evt){
        document.addEventListener(evt, _resetIdleTimer, { passive: true });
    });
})();
</script>

        var req = indexedDB.open(DB_NAME, 1);

            e.target.result.createObjectStore(STORE);

        req.onsuccess = function(e) { cb(e.target.result); };
        req.onerror = function() { cb(null); };

        var tx = db.transaction(STORE, 'readonly');
        var req = tx.objectStore(STORE).get(KEY_ID);

        req.onerror = function() { cb(null); };

    function _putKey(db, key, cb) {
        var tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).put(key, KEY_ID);
        tx.oncomplete = cb;
        tx.onerror = cb;

        return new Promise(function(resolve) {

        <button class="modal-btn del" onclick="confirmYes()" style="margin-top:6px;">✕ YES, DELETE</button>
        <button class="modal-btn secondary" onclick="closeModal('confirm-modal')">CANCEL</button>

<script>

function escapeHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#x27;')
        .replace(/`/g, '&#x60;');
}

function getWebsites() { return JSON.parse(localStorage.getItem('scpWebsites')) || []; }
function saveWebsites(w) { localStorage.setItem('scpWebsites', JSON.stringify(w)); }
function getHacks() { return JSON.parse(localStorage.getItem('scpHacks')) || []; }
function saveHacks(h) { localStorage.setItem('scpHacks', JSON.stringify(h)); }

let currentUser = '', currentUserData = null, isAdmin = false, isTeacher = false;
let activeTab = 'websites', pendingConfirm = null;

const CAT_COLORS = { blooket:'#4488ff', kahoot:'#ff3399', gimkit:'#ffcc00', quizlet:'#3fbf3f', other:'#888' };
const CAT_LABELS = { blooket:'🟦 BLOOKET', kahoot:'📍 KAHOOT', gimkit:'💰 GIMKIT', quizlet:'📖 QUIZLET', other:'🔧 OTHER' };

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function openConfirm(msg, fn) { pendingConfirm = fn; document.getElementById('confirm-body').innerText = msg; openModal('confirm-modal'); }
function confirmYes() { closeModal('confirm-modal'); if (pendingConfirm) pendingConfirm(); pendingConfirm = null; }

// ── TABS ───────────────────────────────────────────────────────────────────────
function switchTab(tab) {
    activeTab = tab;
    ['websites','games','hacks'].forEach(t => {
        const el = document.getElementById('tab-' + t);
        if (el) el.classList.toggle('active', t === tab);
    });
    document.getElementById('section-title').innerText = {websites:'WEBSITES', games:'GAMES', hacks:'HACKS'}[tab];

    // Reset search on tab switch
    document.getElementById('tab-search').value = '';
    const placeholder = { websites:'🔍 SEARCH WEBSITES...', games:'🔍 SEARCH GAMES...', hacks:'🔍 SEARCH HACKS...' };
    document.getElementById('tab-search').placeholder = placeholder[tab] || '🔍 SEARCH...';

    // Who can add?
    let canAdd = false;
    if (tab === 'hacks')    canAdd = !isTeacher || isAdmin;
    if (tab === 'websites') canAdd = isAdmin || isTeacher;
    if (tab === 'games')    canAdd = isAdmin;
    const addBtn = document.getElementById('add-btn');
    addBtn.style.display = canAdd ? 'block' : 'none';
    addBtn.onclick = tab === 'hacks' ? openAddHackModal : openAddModal;

    tab === 'hacks' ? renderHacks() : renderCards();
}

function onSearchInput() {
    activeTab === 'hacks' ? renderHacks() : renderCards();
}

// ── WEBSITES / GAMES ───────────────────────────────────────────────────────────
function renderCards() {
    const query = (document.getElementById('tab-search').value || '').toLowerCase().trim();
    const typeKey = activeTab === 'games' ? 'game' : 'website';
    let all = getWebsites().filter(w => w.type === typeKey);
    if (query) all = all.filter(w =>
        (w.title||'').toLowerCase().includes(query) ||
        (w.description||'').toLowerCase().includes(query)
    );
    const grid = document.getElementById('card-grid');
    if (!all.length) { grid.innerHTML = `<div class="empty-msg">${query ? '// NO RESULTS //' : '// NOTHING HERE YET //'}</div>`; return; }
    grid.innerHTML = '';
    all.forEach(w => {
        const canDel = isAdmin || (isTeacher && w.addedBy && w.addedBy.toLowerCase() === currentUser.toLowerCase());
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            ${canDel ? `<button class="card-del" onclick="deleteEntry('${w.id}')">✕</button>` : ''}
            <div class="card-title">${escapeHtml(w.title)}</div>
            <div class="card-desc">${escapeHtml(w.description || '')}</div>
            <div class="card-footer">
                <a class="card-link" href="${(w.url||'#').startsWith('http')?escapeHtml(w.url):'#'}" target="_blank" rel="noopener">▶ OPEN</a>
                <span class="card-tag ${w.type === 'game' ? 'tag-game' : 'tag-web'}">${w.type === 'game' ? '🎮 GAME' : '🌐 SITE'}</span>
            </div>`;
        grid.appendChild(div);
    });
}

function openAddModal() {
    document.getElementById('add-modal-title').innerText = activeTab === 'games' ? 'ADD GAME' : 'ADD WEBSITE';
    ['add-title','add-url','add-desc'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('add-error').innerText = '';
    openModal('add-modal');
    setTimeout(() => document.getElementById('add-title').focus(), 80);
}

function submitAdd() {
    const title = document.getElementById('add-title').value.trim();
    const url   = document.getElementById('add-url').value.trim();
    const desc  = document.getElementById('add-desc').value.trim();
    if (!title || !url) { document.getElementById('add-error').innerText = 'Title and URL are required.'; return; }
    if (!url.startsWith('http')) { document.getElementById('add-error').innerText = 'URL must start with http/https.'; return; }
    const items = getWebsites();
    items.push({ id: Date.now().toString(), title, url, description: desc, type: activeTab === 'games' ? 'game' : 'website', addedBy: currentUser, addedAt: Date.now() });
    saveWebsites(items);
    closeModal('add-modal');
    renderCards();
}

function deleteEntry(id) {
    const w = getWebsites().find(x => x.id === id);
    openConfirm(`This will remove "${w ? w.title : 'this entry'}" from the list. The actual website is not affected.`, () => {
        saveWebsites(getWebsites().filter(x => x.id !== id));
        renderCards();
    });
}

// ── HACKS ──────────────────────────────────────────────────────────────────────
function renderHacks() {
    const query = (document.getElementById('tab-search').value || '').toLowerCase().trim();
    let all = getHacks().sort((a, b) => b.addedAt - a.addedAt);
    if (query) {
        all = all.filter(h =>
            h.title.toLowerCase().includes(query) ||
            (h.description || '').toLowerCase().includes(query) ||
            (h.category || '').toLowerCase().includes(query)
        );
    }
    const grid = document.getElementById('card-grid');
    if (!all.length) {
        grid.innerHTML = `<div class="empty-msg">${query ? '// NO HACKS MATCH YOUR SEARCH //' : '// NO HACKS ADDED YET //'}</div>`;
        return;
    }
    grid.innerHTML = '';
    all.forEach(h => {
        const canDel = isAdmin || (h.addedBy && h.addedBy.toLowerCase() === currentUser.toLowerCase());
        const color  = CAT_COLORS[h.category] || '#888';
        const label  = CAT_LABELS[h.category]  || h.category.toUpperCase();
        const div = document.createElement('div');
        div.className = 'card';
        const codeEscaped = h.code ? h.code.replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
        const snippet = h.code ? `<div class="code-snippet">${codeEscaped.substring(0,150)}${h.code.length>150?'...':''}</div>` : '';
        const copyBtn = h.code ? `<button class="card-link" onclick="copyHackCode(event,'${h.id}')">📋 COPY CODE</button>` : '';
        div.innerHTML = `
            ${canDel ? `<button class="card-del" onclick="deleteHack('${h.id}')">✕</button>` : ''}
            <div class="card-title">${escapeHtml(h.title)}</div>
            <span class="card-tag" style="border-color:${color};color:${color};width:fit-content;">${label}</span>
            <div class="card-desc">${escapeHtml(h.description || '')}</div>
            ${snippet}
            <div class="card-footer">${copyBtn}</div>`;
        grid.appendChild(div);
    });
}

function openAddHackModal() {
    ['hack-title','hack-desc','hack-code'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('hack-error').innerText = '';
    openModal('add-hack-modal');
    setTimeout(() => document.getElementById('hack-title').focus(), 80);
}

function submitHack() {
    const title = document.getElementById('hack-title').value.trim();
    const cat   = document.getElementById('hack-category').value;
    const desc  = document.getElementById('hack-desc').value.trim();
    const code  = document.getElementById('hack-code').value.trim();
    if (!title) { document.getElementById('hack-error').innerText = 'Title is required.'; return; }
    if (!desc)  { document.getElementById('hack-error').innerText = 'Description is required.'; return; }
    const hacks = getHacks();
    hacks.push({ id: Date.now().toString(), title, category: cat, description: desc, code, addedBy: currentUser, addedAt: Date.now() });
    saveHacks(hacks);
    closeModal('add-hack-modal');
    renderHacks();
}

function deleteHack(id) {
    const h = getHacks().find(x => x.id === id);
    openConfirm(`This will permanently delete "${h ? h.title : 'this hack'}" and all its code. This cannot be undone.`, () => {
        saveHacks(getHacks().filter(x => x.id !== id));
        renderHacks();
    });
}

function copyHackCode(evt, id) {
    const h = getHacks().find(x => x.id === id);
    if (!h || !h.code) return;
    navigator.clipboard.writeText(h.code).then(() => {
        const btn = evt.target;
        const orig = btn.innerText;
        btn.innerText = '✓ COPIED!';
        setTimeout(() => btn.innerText = orig, 1500);
    });
}

// ── INIT ───────────────────────────────────────────────────────────────────────
window.onload = function () {
    const username = localStorage.getItem('loggedInUser');
    if (!username) { window.location.href = 'Index.html'; return; }
    currentUser = username;
    const accounts = JSON.parse(localStorage.getItem('approvedAccounts')) || [];
    currentUserData = accounts.find(a => a.username.toLowerCase() === username.toLowerCase());
    if (!currentUserData || !Array.isArray(currentUserData.access) || !currentUserData.access.includes('Websites')) {
        document.getElementById('main').innerHTML = '<div style="flex:1;display:flex;justify-content:center;align-items:center;font-size:12px;letter-spacing:1.5px;color:var(--scp-green-soft);opacity:0.5;">// ACCESS DENIED //</div>';
        return;
    }
    isAdmin   = currentUserData.access.includes('Admin');
    isTeacher = currentUserData.role === 'teacher';
    if (!isTeacher || isAdmin) document.getElementById('tab-hacks').style.display = '';
    if (isTeacher && !isAdmin) document.getElementById('tab-games').style.display = 'none';
    // Set first tab active based on role
    const firstTab = document.querySelector('.sidebar-tab:not([style*="display:none"])');
    if (firstTab) firstTab.click();
    switchTab('websites');
};
</script>

<script>
/* scpTheme-postload */
(function(){
    var t=JSON.parse(localStorage.getItem('scpTheme')||'{}');
    if(!t.bg && !t.accent) return;
    function applyEl(id){ var el=document.getElementById(id); if(el&&t.bg) el.style.backgroundColor=t.bg; }
    function run(){ applyEl('header'); applyEl('navbar'); if(t.bg) document.body.style.backgroundColor=t.bg; }
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',run);
    else run();
})();

// ── DEBOUNCE UTILITY ──────────────────────────────────────────────────────────
function _debounce(fn, delay) {
    var timer;
    return function() {
        var args = arguments, ctx = this;
        clearTimeout(timer);
        timer = setTimeout(function(){ fn.apply(ctx, args); }, delay);
    };
}

function sanitizeUrl(url) {
    url = String(url).trim();
    // Only allow http/https URLs
    if (url && !url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
    }
    // Block javascript: protocol injection
    if (/^javascript:/i.test(url)) return '';
    return url.slice(0, 500);
}
function sanitizeInput(str) {
    return String(str).replace(/[<>"'`]/g, '').trim().slice(0, 200);
}
</script>
